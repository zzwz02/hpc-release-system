  <text x="790" y="292" text-anchor="middle" class="small">信息缺失或 app_info 差异未确认时退回 Owner</text>
  <path d="M1250 170 C1250 132 1085 132 1085 170" class="edge-dash" />
  <text x="1168" y="128" text-anchor="middle" class="small">重检通过后回到 QA</text>

  <rect x="50" y="250" width="700" height="68" class="note" />
  <text x="70" y="276" class="label">初始化、新增 app 与 app_info 差异规则</text>
  <text x="70" y="296" class="small">CSV、alias mapping、app-owner 映射仅首次维护；后续沿用上一版本并拉取新 app_info.json。</text>
  <text x="70" y="314" class="small">系统标出版本、芯片、架构、build/test、test_cmd 差异，owner 确认后才能进入 QA。</text>

  <rect x="30" y="370" width="1740" height="360" class="lane" />
  <text x="50" y="402" class="lane-title">App 发布快照</text>

  <rect x="60" y="440" width="120" height="54" class="box" />
  <text x="120" y="471" text-anchor="middle" class="label">已导入</text>

  <rect x="220" y="440" width="150" height="54" class="box-data" />
  <text x="295" y="463" text-anchor="middle" class="label">已分配 Owner</text>
  <text x="295" y="481" text-anchor="middle" class="small">支持多人共有</text>

  <rect x="410" y="420" width="160" height="54" class="box-gate" />
  <text x="490" y="443" text-anchor="middle" class="label">信息不完整</text>
  <text x="490" y="461" text-anchor="middle" class="small">阻塞 QA</text>

  <rect x="410" y="510" width="160" height="54" class="box-ok" />
  <text x="490" y="533" text-anchor="middle" class="label">信息完整</text>
  <text x="490" y="551" text-anchor="middle" class="small">必填项齐备</text>

  <rect x="620" y="510" width="160" height="54" class="box-ok" />
  <text x="700" y="533" text-anchor="middle" class="label">Owner 已确认</text>
  <text x="700" y="551" text-anchor="middle" class="small">负责人确认</text>

  <rect x="830" y="496" width="190" height="82" class="box-gate" />
  <text x="925" y="520" text-anchor="middle" class="label">可进入 QA</text>
  <text x="925" y="540" text-anchor="middle" class="small">发布信息完整</text>
  <text x="925" y="558" text-anchor="middle" class="small">差异确认 + 测试说明完成</text>

  <rect x="1070" y="510" width="120" height="54" class="box-ok" />
  <text x="1130" y="541" text-anchor="middle" class="label">QA 中</text>

  <rect x="1240" y="420" width="170" height="66" class="box-gate" />
  <text x="1325" y="446" text-anchor="middle" class="label">QA 修改申请</text>
  <text x="1325" y="464" text-anchor="middle" class="small">owner 提交</text>

  <rect x="1240" y="536" width="170" height="66" class="box-gate" />
  <text x="1325" y="562" text-anchor="middle" class="label">QA 需重检</text>
  <text x="1325" y="580" text-anchor="middle" class="small">关键字段删减</text>

  <rect x="1460" y="420" width="130" height="54" class="box-ok" />
  <text x="1525" y="443" text-anchor="middle" class="label">QA 通过</text>
  <text x="1525" y="461" text-anchor="middle" class="small">或 QA 失败</text>

  <rect x="1460" y="536" width="150" height="66" class="box-gate" />
  <text x="1535" y="562" text-anchor="middle" class="label">移出本次发布</text>
  <text x="1535" y="580" text-anchor="middle" class="small">本次不发布</text>

  <rect x="1640" y="476" width="120" height="70" class="box-lock" />
  <text x="1700" y="503" text-anchor="middle" class="label">快照</text>
  <text x="1700" y="521" text-anchor="middle" class="label">已锁定</text>
  <text x="1700" y="539" text-anchor="middle" class="small">不可变</text>

