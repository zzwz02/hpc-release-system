  <rect x="650" y="628" width="160" height="44" class="box-gate" />
  <text x="730" y="646" text-anchor="middle" class="label">app_info 差异</text>
  <text x="730" y="664" text-anchor="middle" class="small">待确认</text>

  <rect x="850" y="628" width="150" height="44" class="box-ok" />
  <text x="925" y="646" text-anchor="middle" class="label">差异已确认</text>
  <text x="925" y="664" text-anchor="middle" class="small">逐项确认</text>

  <rect x="1040" y="628" width="190" height="44" class="box-ok" />
  <text x="1135" y="646" text-anchor="middle" class="label">test_cmd 说明</text>
  <text x="1135" y="664" text-anchor="middle" class="small">已更新</text>

