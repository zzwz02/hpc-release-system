  <rect x="55" y="615" width="560" height="72" class="note" />
  <text x="75" y="642" class="label">QA 门禁</text>
  <text x="75" y="662" class="small">每个 app_info.json app_test.*.test_cmd 都必须说明数据集、测试内容、结果查看方式和通过标准。</text>
  <text x="75" y="680" class="small">Owner 可新增测试项，但不能替代 app_info 中已有测试命令的说明。</text>

  <rect x="30" y="760" width="1740" height="270" class="lane" />
  <text x="50" y="792" class="lane-title">变更申请</text>

  <rect x="80" y="845" width="120" height="54" class="box" />
  <text x="140" y="876" text-anchor="middle" class="label">草稿</text>

  <rect x="250" y="845" width="130" height="54" class="box" />
  <text x="315" y="876" text-anchor="middle" class="label">已提交</text>

  <rect x="440" y="795" width="150" height="60" class="box-ok" />
  <text x="515" y="820" text-anchor="middle" class="label">自动应用</text>
  <text x="515" y="838" text-anchor="middle" class="small">错别字/格式</text>

  <rect x="440" y="900" width="170" height="66" class="box-gate" />
  <text x="525" y="926" text-anchor="middle" class="label">等待 RM Review</text>
  <text x="525" y="944" text-anchor="middle" class="small">关键字段</text>

  <rect x="690" y="900" width="210" height="66" class="box-gate" />
  <text x="795" y="926" text-anchor="middle" class="label">已批准，需重检</text>
  <text x="795" y="944" text-anchor="middle" class="small">重新跑 QA 准入</text>

  <rect x="980" y="845" width="120" height="54" class="box-ok" />
  <text x="1040" y="876" text-anchor="middle" class="label">已应用</text>

  <rect x="1160" y="845" width="120" height="54" class="box-lock" />
  <text x="1220" y="876" text-anchor="middle" class="label">已拒绝</text>

  <rect x="1330" y="815" width="340" height="96" class="note" />
  <text x="1350" y="842" class="label">QA 期间规则</text>
  <text x="1350" y="862" class="small">QA 开始后，发布范围只允许删减。</text>
  <text x="1350" y="880" class="small">测试、环境、结果查看、安装/运行命令均为关键字段。</text>
  <text x="1350" y="898" class="small">新增 app、芯片、架构、包类型、版本都会被阻止。</text>

  <rect x="250" y="975" width="130" height="38" class="box-gate" />
  <text x="315" y="999" text-anchor="middle" class="label">停止申请</text>

  <rect x="430" y="975" width="130" height="38" class="box-gate" />
  <text x="495" y="999" text-anchor="middle" class="label">RM 审批</text>

  <rect x="610" y="975" width="130" height="38" class="box-ok" />
  <text x="675" y="999" text-anchor="middle" class="label">停止生效</text>

  <rect x="790" y="975" width="160" height="38" class="box-data" />
  <text x="870" y="999" text-anchor="middle" class="label">通知 QA/Infra</text>

