<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="1300" viewBox="0 0 1660 1300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <style>
      .title { font: 700 25px "Microsoft YaHei","SimHei",Arial,sans-serif; fill:#0f172a; }
      .subtitle { font: 400 14px "Microsoft YaHei","SimHei",Arial,sans-serif; fill:#475569; }
      .lane { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1; rx:14; }
      .lane-title { font:700 17px "Microsoft YaHei","SimHei",Arial,sans-serif; fill:#0f172a; }
      .box { fill:#ffffff; stroke:#475569; stroke-width:1.4; rx:9; }
      .phase { fill:#eef3ff; stroke:#2563eb; stroke-width:1.7; rx:9; }
      .gate { fill:#fff8ea; stroke:#b45309; stroke-width:1.6; rx:9; }
      .ok { fill:#ecfdf3; stroke:#15803d; stroke-width:1.5; rx:9; }
      .lock { fill:#fef3f2; stroke:#b42318; stroke-width:1.7; rx:9; }
      .data { fill:#eff6ff; stroke:#2563eb; stroke-width:1.4; rx:9; }
      .note { fill:#fffbeb; stroke:#d97706; stroke-width:1.3; rx:9; }
      .label { font:700 14px "Microsoft YaHei","SimHei",Arial,sans-serif; fill:#0f172a; }
      .small { font:400 11.5px "Microsoft YaHei","SimHei",Arial,sans-serif; fill:#475569; }
      .tlabel { font:600 11.5px "Microsoft YaHei","SimHei",Arial,sans-serif; fill:#1d4ed8; }
      .edge { stroke:#475569; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
      .edge-dash { stroke:#94a3b8; stroke-width:1.4; fill:none; stroke-dasharray:6 5; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1660" height="1300" fill="#ffffff" />
  <text x="40" y="46" class="title">HPC App 发布信息协作系统 · 流程总览</text>
  <text x="40" y="73" class="subtitle">一个 release 由「App 冻结」「Doc deadline」两个北京时间 deadline 推进；每个 app 的发布信息逐 release 独立保存。角色：RM 发布管理 / Owner 应用负责人 / QA 测试。</text>

  <!-- ===== Lane A: release lifecycle ===== -->
  <rect x="30" y="90" width="1600" height="335" class="lane" />
  <text x="52" y="124" class="lane-title">① Release 生命周期 —— 随两个北京时间 deadline 自动推进</text>

  <rect x="60" y="210" width="270" height="168" class="phase" />
  <text x="195" y="244" text-anchor="middle" class="label">① 创建 Release</text>
  <text x="195" y="268" text-anchor="middle" class="small">RM：首版用单个 CSV 初始化</text>
  <text x="195" y="286" text-anchor="middle" class="small">导入；后续从上一版克隆，</text>
  <text x="195" y="304" text-anchor="middle" class="small">继承每个 app 的快照信息</text>
  <text x="195" y="322" text-anchor="middle" class="small">并设两个 deadline</text>

  <rect x="377" y="210" width="270" height="168" class="phase" />
  <text x="512" y="244" text-anchor="middle" class="label">② App 冻结前</text>
  <text x="512" y="268" text-anchor="middle" class="small">可新增 app、任意设定</text>
  <text x="512" y="286" text-anchor="middle" class="small">release 决策</text>
  <text x="512" y="304" text-anchor="middle" class="small">文档 / app_info / 表单</text>
  <text x="512" y="322" text-anchor="middle" class="small">均可自由编辑</text>

  <rect x="694" y="210" width="270" height="168" class="phase" />
  <text x="829" y="244" text-anchor="middle" class="label">③ App 冻结后</text>
  <text x="829" y="268" text-anchor="middle" class="small">发布范围冻结：不可新增</text>
  <text x="829" y="286" text-anchor="middle" class="small">release 决策的 app；决策</text>
  <text x="829" y="304" text-anchor="middle" class="small">只能下调、不能升回 release</text>
  <text x="829" y="322" text-anchor="middle" class="small">文档 / app_info 仍可编辑</text>

  <rect x="1011" y="210" width="270" height="168" class="phase" />
  <text x="1146" y="244" text-anchor="middle" class="label">④ Doc deadline 后</text>
  <text x="1146" y="268" text-anchor="middle" class="small">文档 / 表单 / app_info 冻结</text>
  <text x="1146" y="286" text-anchor="middle" class="small">仅 QA 可标注 QA 状态</text>
  <text x="1146" y="304" text-anchor="middle" class="small">RM 仍可下调决策，把 app</text>
  <text x="1146" y="322" text-anchor="middle" class="small">移出本次发布</text>

  <rect x="1328" y="210" width="270" height="168" class="lock" />
  <text x="1463" y="244" text-anchor="middle" class="label">⑤ Release 最终锁定</text>
  <text x="1463" y="268" text-anchor="middle" class="small">RM 在部门 manager 审核后</text>
  <text x="1463" y="286" text-anchor="middle" class="small">执行 Final Lock</text>
  <text x="1463" y="304" text-anchor="middle" class="small">快照不可变；生成最终</text>
  <text x="1463" y="322" text-anchor="middle" class="small">RST + release-data</text>

  <text x="353" y="203" text-anchor="middle" class="tlabel">release 建立</text>
  <text x="670" y="203" text-anchor="middle" class="tlabel">过 App 冻结 deadline</text>
  <text x="987" y="203" text-anchor="middle" class="tlabel">过 Doc deadline</text>
  <text x="1304" y="203" text-anchor="middle" class="tlabel">RM 执行 Final Lock</text>

  <path d="M330 294 L377 294" class="edge" />
  <path d="M647 294 L694 294" class="edge" />
  <path d="M964 294 L1011 294" class="edge" />
  <path d="M1281 294 L1328 294" class="edge" />
  <path d="M1463 378 C1463 408 1146 408 1146 380" class="edge-dash" />
  <text x="1304" y="404" text-anchor="middle" class="tlabel">RM 解锁可回退到 Doc deadline 后</text>

  <!-- ===== Lane B: per-app publish snapshot ===== -->
  <rect x="30" y="445" width="1600" height="510" class="lane" />
  <text x="52" y="479" class="lane-title">② Release 内每个 App 的发布快照 —— 发布信息逐 release 独立</text>

  <rect x="60" y="578" width="180" height="92" class="box" />
  <text x="150" y="616" text-anchor="middle" class="label">App 进入本 release</text>
  <text x="150" y="636" text-anchor="middle" class="small">导入 / 克隆继承 / Owner 新增</text>

  <rect x="276" y="508" width="195" height="62" class="ok" />
  <text x="373" y="533" text-anchor="middle" class="label">release 决策 = release</text>
  <text x="373" y="552" text-anchor="middle" class="small">进入文档与 QA 流程</text>

  <rect x="276" y="598" width="195" height="62" class="box" />
  <text x="373" y="623" text-anchor="middle" class="label">release 决策 = cicd_only</text>
  <text x="373" y="642" text-anchor="middle" class="small">仅 CICD 跟踪，不进文档 / QA</text>

  <rect x="276" y="688" width="195" height="62" class="box" />
  <text x="373" y="713" text-anchor="middle" class="label">release 决策 = stopped</text>
  <text x="373" y="732" text-anchor="middle" class="small">本轮停止发布 / 停止维护</text>

  <rect x="510" y="508" width="210" height="92" class="data" />
  <text x="615" y="540" text-anchor="middle" class="label">上传 / 拉取 app_info</text>
  <text x="615" y="560" text-anchor="middle" class="small">解析 版本 / 芯片 / 测试项</text>
  <text x="615" y="578" text-anchor="middle" class="small">列出与上一版本的 diff</text>

  <rect x="760" y="478" width="175" height="56" class="box" />
  <text x="847" y="501" text-anchor="middle" class="label">补齐文档字段</text>
  <text x="847" y="520" text-anchor="middle" class="small">5 段说明文字</text>

  <rect x="760" y="572" width="175" height="56" class="box" />
  <text x="847" y="595" text-anchor="middle" class="label">补齐测试说明</text>
  <text x="847" y="614" text-anchor="middle" class="small">每个 test_cmd 的测试说明</text>

  <rect x="975" y="508" width="170" height="92" class="ok" />
  <text x="1060" y="548" text-anchor="middle" class="label">Owner 提交确认</text>
  <text x="1060" y="568" text-anchor="middle" class="small">确认发布信息已齐</text>

  <rect x="1185" y="508" width="220" height="92" class="ok" />
  <text x="1295" y="539" text-anchor="middle" class="label">QA 测试并标注状态</text>
  <text x="1295" y="558" text-anchor="middle" class="small">未测试 / 通过 / 存在问题 / 不可发布</text>
  <text x="1295" y="576" text-anchor="middle" class="small">QA 上传 QA log</text>

  <rect x="1445" y="500" width="150" height="108" class="gate" />
  <text x="1520" y="544" text-anchor="middle" class="label">进入最终发布</text>
  <text x="1520" y="564" text-anchor="middle" class="small">满足全部</text>
  <text x="1520" y="580" text-anchor="middle" class="small">门禁条件</text>

  <path d="M240 624 C262 624 254 539 276 539" class="edge" />
  <path d="M240 624 C260 626 258 629 276 629" class="edge" />
  <path d="M240 624 C262 624 254 719 276 719" class="edge" />
  <path d="M471 539 C492 539 490 554 510 554" class="edge" />
  <path d="M720 554 C742 554 740 506 760 506" class="edge" />
  <path d="M720 554 C742 554 740 600 760 600" class="edge" />
  <path d="M935 506 C957 506 955 532 975 532" class="edge" />
  <path d="M935 600 C957 600 955 576 975 576" class="edge" />
  <path d="M1145 554 L1185 554" class="edge" />
  <path d="M1405 554 L1445 554" class="edge" />

  <rect x="60" y="775" width="1535" height="165" class="note" />
  <text x="80" y="803" class="label">说明</text>
  <text x="80" y="826" class="small">「进入最终发布」门禁：release 决策 + Owner 已确认 + 文档字段与测试说明齐全 + QA 状态为「通过」或「存在问题」。</text>
  <text x="80" y="848" class="small">QA 标注「存在问题」仍会发布，问题写入文档「已知限制」段；「不可发布」不进入本次发布。Owner 可新增 owner-added 测试项。</text>
  <text x="80" y="870" class="small">上传 / 拉取 app_info 会列出与上一版本的 diff，无需 owner 逐项确认；上传后停留在编辑状态，可继续补充文档与测试说明。</text>
  <text x="80" y="892" class="small">cicd_only / stopped 决策的 app 不进入文档与 QA 流程。每个 app 的「变更记录」按 release 分别查看，并展开到字段级改动。</text>

  <!-- ===== Lane C: wrap-up and outputs ===== -->
  <rect x="30" y="975" width="1600" height="250" class="lane" />
  <text x="52" y="1009" class="lane-title">③ 收尾与产出</text>

  <rect x="60" y="1052" width="220" height="78" class="box" />
  <text x="170" y="1086" text-anchor="middle" class="label">RM 生成 Manager Review CSV</text>
  <text x="170" y="1106" text-anchor="middle" class="small">覆盖本 release 全部 app</text>

  <rect x="322" y="1052" width="180" height="78" class="gate" />
  <text x="412" y="1086" text-anchor="middle" class="label">部门 Manager 审核</text>
  <text x="412" y="1106" text-anchor="middle" class="small">在 Gerrit 上 merge 报告</text>

  <rect x="544" y="1052" width="185" height="78" class="lock" />
  <text x="636" y="1086" text-anchor="middle" class="label">RM 执行 Final Lock</text>
  <text x="636" y="1106" text-anchor="middle" class="small">快照冻结、不可变</text>

  <rect x="775" y="1014" width="300" height="40" class="data" />
  <text x="925" y="1039" text-anchor="middle" class="label">release note RST</text>
  <rect x="775" y="1060" width="300" height="40" class="data" />
  <text x="925" y="1085" text-anchor="middle" class="label">HPC Manual App 章节 RST</text>
  <rect x="775" y="1106" width="300" height="40" class="data" />
  <text x="925" y="1131" text-anchor="middle" class="label">AI4Sci User Guide 章节 RST</text>
  <rect x="775" y="1152" width="300" height="40" class="data" />
  <text x="925" y="1177" text-anchor="middle" class="label">release-data JSON</text>

  <path d="M280 1091 L322 1091" class="edge" />
  <path d="M502 1091 L544 1091" class="edge" />
  <path d="M729 1091 C752 1091 752 1034 775 1034" class="edge" />
  <path d="M729 1091 C752 1091 752 1080 775 1080" class="edge" />
  <path d="M729 1091 C752 1091 752 1126 775 1126" class="edge" />
  <path d="M729 1091 C752 1091 752 1172 775 1172" class="edge" />

  <rect x="1110" y="1052" width="490" height="120" class="note" />
  <text x="1130" y="1079" class="label">其他</text>
  <text x="1130" y="1101" class="small">QA 阶段，RM 可导出「测试范围 CSV」交 QA 使用。</text>
  <text x="1130" y="1123" class="small">Final Lock 后如需修正：由 RM 解锁，或留到下一个 release。</text>
  <text x="1130" y="1145" class="small">Admin 负责账号与数据库管理（备份 / 清空）。</text>

  <!-- ===== legend ===== -->
  <rect x="30" y="1245" width="1600" height="54" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="12" />
  <text x="52" y="1278" class="label">图例</text>
  <rect x="128" y="1264" width="20" height="15" class="phase" />
  <text x="156" y="1277" class="small">Release 阶段</text>
  <rect x="288" y="1264" width="20" height="15" class="box" />
  <text x="316" y="1277" class="small">步骤 / 状态</text>
  <rect x="440" y="1264" width="20" height="15" class="gate" />
  <text x="468" y="1277" class="small">门禁 / 条件</text>
  <rect x="592" y="1264" width="20" height="15" class="ok" />
  <text x="620" y="1277" class="small">完成 / 活动</text>
  <rect x="744" y="1264" width="20" height="15" class="lock" />
  <text x="772" y="1277" class="small">锁定 / 最终</text>
  <rect x="896" y="1264" width="20" height="15" class="data" />
  <text x="924" y="1277" class="small">数据 / 产出</text>
  <line x1="1050" y1="1272" x2="1096" y2="1272" class="edge" />
  <text x="1108" y="1277" class="small">流转</text>
  <line x1="1210" y1="1272" x2="1256" y2="1272" class="edge-dash" />
  <text x="1268" y="1277" class="small">条件 / 回退</text>
</svg>
