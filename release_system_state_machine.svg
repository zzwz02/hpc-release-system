<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1520" viewBox="0 0 1800 1520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 28px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 18px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .box-soft { fill: #f8fafc; stroke: #64748b; stroke-width: 1.2; rx: 8; }
      .box-gate { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; rx: 8; }
      .box-lock { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.7; rx: 8; }
      .box-ok { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
      .box-data { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .label { font: 600 14px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .edge-dash { stroke: #64748b; stroke-width: 1.3; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .note { fill: #fffbeb; stroke: #d97706; stroke-width: 1.4; rx: 8; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 12; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1520" fill="#ffffff" />
  <text x="40" y="48" class="title">HPC App 发布系统状态机</text>
  <text x="40" y="76" class="subtitle">QA 准入要求发布信息完整，并且 app_info.json 中每个 test_cmd 都完成测试说明。发布锁定后所有快照不可变。CSV 仅首次初始化导入，后续发布沿用上一版本信息。</text>

  <rect x="30" y="110" width="1740" height="230" class="lane" />
  <text x="50" y="142" class="lane-title">发布周期</text>

  <rect x="60" y="170" width="130" height="54" class="box" />
  <text x="125" y="201" text-anchor="middle" class="label">草稿</text>

  <rect x="230" y="170" width="150" height="54" class="box-data" />
  <text x="305" y="193" text-anchor="middle" class="label">初始化/克隆数据</text>
  <text x="305" y="211" text-anchor="middle" class="small">首次 CSV/映射，后续沿用</text>

  <rect x="410" y="164" width="160" height="66" class="box-data" />
  <text x="490" y="190" text-anchor="middle" class="label">对比 app_info</text>
  <text x="490" y="208" text-anchor="middle" class="small">拉新 JSON，对比上版</text>

  <rect x="610" y="170" width="150" height="54" class="box" />
  <text x="685" y="193" text-anchor="middle" class="label">Owner 填写中</text>
  <text x="685" y="211" text-anchor="middle" class="small">确认差异和待办</text>

  <rect x="800" y="164" width="180" height="66" class="box-gate" />
  <text x="890" y="190" text-anchor="middle" class="label">QA 准入检查</text>
  <text x="890" y="208" text-anchor="middle" class="small">完整 + 差异已确认</text>

  <rect x="1020" y="170" width="130" height="54" class="box-ok" />
  <text x="1085" y="201" text-anchor="middle" class="label">QA 进行中</text>

  <rect x="1180" y="170" width="140" height="54" class="box-gate" />
  <text x="1250" y="193" text-anchor="middle" class="label">QA 重新检查</text>
  <text x="1250" y="211" text-anchor="middle" class="small">只允许删减</text>

  <rect x="1370" y="164" width="150" height="66" class="box-gate" />
  <text x="1445" y="190" text-anchor="middle" class="label">等待锁定</text>
  <text x="1445" y="208" text-anchor="middle" class="small">QA 完成</text>

  <rect x="1560" y="164" width="150" height="66" class="box-lock" />
  <text x="1635" y="190" text-anchor="middle" class="label">发布已锁定</text>
  <text x="1635" y="208" text-anchor="middle" class="small">快照不可变</text>

  <rect x="1340" y="250" width="130" height="44" class="box-data" />
  <text x="1405" y="276" text-anchor="middle" class="label">最终生成</text>

  <rect x="1500" y="250" width="130" height="44" class="box-data" />
  <text x="1565" y="276" text-anchor="middle" class="label">Gerrit 推送</text>

  <rect x="1500" y="300" width="130" height="34" class="box-ok" />
  <text x="1565" y="322" text-anchor="middle" class="label">Docs 合入</text>

